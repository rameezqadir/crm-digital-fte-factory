version: '3.8'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: fte_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./production/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"

  fte-api:
    build: .
    depends_on:
      - postgres
      - kafka
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: fte_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OPENAI_API_KEY: \
      ANTHROPIC_API_KEY: \
    ports:
      - "8000:8000"

volumes:
  postgres_data:
